name: Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/ABC/ABC.csproj

      - name: Build
        run: dotnet build src/ABC/ABC.csproj -c Release -f net9.0-windows10.0.22621.0 --no-restore

      - name: Publish (self-contained, single file, win-x86)
        run: >
          dotnet publish src/ABC/ABC.csproj
          -c Release
          -f net9.0-windows10.0.22621.0
          -r win-x86
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --no-restore
          -o publish/net9.0-windows10.0.22621.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABC-net9.0-windows10.0.22621.0-win-x86
          path: publish/net9.0-windows10.0.22621.0/
